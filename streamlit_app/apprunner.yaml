version: 1
runtime:
  python: python312
build:
  commands:
    build:
      - pip install -r requirements.txt
run:
  command: streamlit run app.py --server.port=8080 --server.address=0.0.0.0
  network:
    port: 8080
    env: APP_PORT
  env:
    - name: SNOWFLAKE_ACCOUNT
      value: "A3209653506471-SALES_ENG_DEMO"
    - name: SNOWFLAKE_USER
      value: "JASON.CHLETSOS@FIVETRAN.COM"
    - name: SNOWFLAKE_ROLE
      value: "SALES_DEMO_ROLE"
    - name: SNOWFLAKE_WAREHOUSE
      value: "DEFAULT"
    - name: SNOWFLAKE_DATABASE
      value: "jason_chletsos"
    # SNOWFLAKE_PRIVATE_KEY_CONTENT is injected from AWS Secrets Manager at deploy time
    # Do NOT add it here — see deployment instructions
