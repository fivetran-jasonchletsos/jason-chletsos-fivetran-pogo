# Pokémon GO dbt Project

name: 'pokemon_go_dbt'
version: '1.0.0'
config-version: 2

# Profile name matches Fivetran destination group ID (used by Fivetran dbt Core transformation)
# For local development, ensure your profiles.yml has a profile named 'twilight_expecting'
profile: 'twilight_expecting'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  pokemon_go_dbt:
    staging:
      +materialized: view
      +schema: pokemon_staging
    marts:
      +materialized: table
      +schema: pokemon_marts

vars:
  # Use default warehouse (no need to specify)
  # warehouse: "COMPUTE_WH"
